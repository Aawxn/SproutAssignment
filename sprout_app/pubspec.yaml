name: sprout_app
description: Sprout - A learning app for little explorers (ages 3-8)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Audio
  audioplayers: ^6.1.0
  flutter_tts: ^4.0.2

  # Camera + ML Kit (Task 4)
  camera: ^0.11.0+2
  google_mlkit_image_labeling: ^0.14.2

  # Runtime permissions
  permission_handler: ^11.3.1

  # Utilities
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#F0FBF4"
  adaptive_icon_foreground: "assets/images/icon_fg.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
